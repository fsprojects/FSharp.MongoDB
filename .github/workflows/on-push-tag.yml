name: Prepare Release
run-name: Prepare release ${{ github.ref_name }}

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

env:
  BUILD_VERSION: ${{ github.ref_name }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Extract version suffix
        run: |
          s=${{ github.ref_name }}
          pat="([^-]*)-?([^-]*)"
          [[ $s =~ $pat ]]
          BUILD_VERSION_SUFFIX=${BASH_REMATCH[2]}
          echo "BUILD_VERSION_SUFFIX=$BUILD_VERSION_SUFFIX" >> "$GITHUB_ENV"

      - name: Build, test, and pack
        run: make publish-all config=Release version=${{ env.BUILD_VERSION }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tag
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Publish test report
        if: (!cancelled())
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: TestResults/**/*.trx
          check_name: Test Results (Tag)
          comment_mode: off
          job_summary: true

      - name: Extract release notes from changelog
        shell: bash
        run: ./.github/scripts/extract-release-notes.sh "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/release-notes.md"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ env.BUILD_VERSION_SUFFIX != '' }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            .out/*.nupkg
